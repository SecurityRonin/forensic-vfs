# Allow unwrap()/expect() inside tests; production keeps them denied (workspace lints).
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Domain terms that look like code identifiers to doc_markdown.
doc-valid-idents = ["PathSpec", "ImageSource", "FileSystem", "SubRange", "SourceCursor", "FileSource", "VolumeSystem", "CryptoLayer", "SourceId", "BitLocker", "FileVault", "dfVFS", "libvshadow", "read_at", "APFS", "exFAT", ".."]
